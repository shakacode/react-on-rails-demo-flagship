name: RSC Smoke

# Keeps the flagship demo green: builds the pinned container and fails the
# run unless the app serves streamed component HTML (bin/smoke exits
# non-zero when Pro/RSC rendering is broken). Runs on PRs, pushes to main, and a weekly
# cron so dependency rot is caught even when the repo is quiet.
#
# Structured so the shared fleet smoke workflow (shakacode/react_on_rails#3898)
# can adopt it: the whole check is `docker compose up -d --build && bin/smoke`.

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Weekly: 14:23 UTC every Monday (off the top of the hour to avoid the
    # GitHub Actions scheduled-job rush).
    - cron: "23 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rsc-smoke:
    name: Container boot + RSC smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build and boot the container
        run: docker compose up -d --build

      - name: Run RSC smoke check
        run: bin/smoke

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Install browser test dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser behavior contract
        run: PLAYWRIGHT_BASE_URL=http://localhost:3000 npm run test:browser

      - name: Show app logs on failure
        if: failure()
        run: docker compose logs

      - name: Shut down
        if: always()
        run: docker compose down
