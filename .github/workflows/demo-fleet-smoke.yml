name: Demo fleet smoke

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    uses: shakacode/react_on_rails/.github/workflows/demo-fleet-smoke.yml@c4f798063f9b1047c3a19022174a6cd8866955d4
    with:
      ruby-version: "3.4.6"
      node-version: "22.12.0"
      install-command: bundle config set path vendor/bundle && bundle install --jobs 4 && npm ci && npx playwright install --with-deps chromium
      test-command: npm run typecheck
      build-command: docker compose build
      smoke-command: docker compose up -d && bin/smoke && PLAYWRIGHT_BASE_URL=http://localhost:3000 npm run test:browser
