# Staging-only Control Plane config for the flagship React on Rails demo.
#
# This demo intentionally boots with deterministic seed data from the container
# entrypoint, so staging does not provision review apps, production promotion,
# external databases, or persistent SQLite volumes.

allow_org_override_by_env: true
allow_app_override_by_env: true

aliases:
  common: &common
    cpln_org: shakacode-open-source-examples-staging
    default_location: aws-us-east-2
    dockerfile: ../Dockerfile
    setup_app_templates:
      - app
      - rails
      - node-renderer

    one_off_workload: rails
    app_workloads:
      - rails
      - node-renderer
    additional_workloads: []

    fix_terminal_size: true
    image_retention_days: 30

apps:
  react-on-rails-demo-flagship-staging:
    <<: *common
    secrets_name: react-on-rails-demo-flagship-staging-secrets
