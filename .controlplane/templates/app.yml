kind: gvc
name: "{{APP_NAME}}"
spec:
  env:
    - name: RAILS_ENV
      value: production
    - name: NODE_ENV
      value: production
    - name: RAILS_LOG_TO_STDOUT
      value: "true"
    - name: RAILS_SERVE_STATIC_FILES
      value: "true"
    - name: RAILS_MAX_THREADS
      value: "5"
    - name: PORT
      value: "3000"
    - name: SECRET_KEY_BASE
      value: "cpln://secret/{{APP_SECRETS}}.SECRET_KEY_BASE"
    - name: RENDERER_URL
      value: "http://node-renderer.{{APP_NAME}}.cpln.local:3800"
    - name: RENDERER_HOST
      value: "0.0.0.0"
    - name: RENDERER_PASSWORD
      value: "cpln://secret/{{APP_SECRETS}}.RENDERER_PASSWORD"
  staticPlacement:
    locationLinks:
      - "{{APP_LOCATION_LINK}}"
